<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun - Lambanapu Mart</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/logo website.png" />
    <style>
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .auth-container h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .auth-container p {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .auth-container p a {
            color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2>Daftar Akun</h2>
        <form id="registerForm">
            <input type="text" id="regNama" class="form-input" placeholder="Nama Lengkap" required />
            <input type="email" id="regEmail" class="form-input" placeholder="Email" required />
            <input type="password" id="regPassword" class="form-input" placeholder="Password" required />
            <button type="submit" class="checkout-final">Daftar Sekarang</button>
        </form>
        <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
    </div>

    <script>
        document
            .getElementById("registerForm")
            .addEventListener("submit", function (e) {
                e.preventDefault();
                const nama = document.getElementById("regNama").value.trim();
                const email = document.getElementById("regEmail").value.trim();
                const password = document.getElementById("regPassword").value;

                let users = JSON.parse(localStorage.getItem("users")) || [];

                // Cek apakah email sudah terdaftar
                if (users.some((user) => user.email === email)) {
                    alert("Email ini sudah terdaftar!");
                    return;
                }

                // Simpan user baru
                users.push({ nama, email, password });
                localStorage.setItem("users", JSON.stringify(users));

                alert("Pendaftaran berhasil! Silakan login.");
                window.location.href = "login.html";
            });
    </script>
</body>

</html>
