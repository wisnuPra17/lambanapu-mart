<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Lambanapu Mart</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/logo website.png" />
    <style>
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .auth-container h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .auth-container p {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .auth-container p a {
            color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2>Login Pelanggan</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" class="form-input" placeholder="Email" required />
            <input type="password" id="loginPassword" class="form-input" placeholder="Password" required />
            <button type="submit" class="checkout-final">Masuk</button>
        </form>
        <p>Belum ada akun? <a href="register.html">Daftar dulu</a></p>
    </div>

    <script>
        document
            .getElementById("loginForm")
            .addEventListener("submit", function (e) {
                e.preventDefault();
                const email = document.getElementById("loginEmail").value.trim();
                const password = document.getElementById("loginPassword").value;

                const users = JSON.parse(localStorage.getItem("users")) || [];
                const userValid = users.find(
                    (user) => user.email === email && user.password === password,
                );

                if (userValid) {
                    // Simpan status login (menyimpan nama user)
                    localStorage.setItem(
                        "currentUser",
                        JSON.stringify({ nama: userValid.nama }),
                    );
                    alert("Login berhasil! Selamat datang kembali.");

                    // Jika sebelumnya diarahkan dari keranjang karena ingin checkout
                    if (document.referrer.includes("cart.html")) {
                        window.location.href = "cart.html";
                    } else {
                        window.location.href = "index.html";
                    }
                } else {
                    alert("Email atau Password salah!");
                }
            });
    </script>
</body>

</html>
